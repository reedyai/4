name: Build and Push Minecraft Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t minecraft-server:latest .

      - name: Tag image for ECR
        run: |
          docker tag minecraft-server:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Smoke test Minecraft server
        run: |
          set -e

          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest"

          echo "Starting container..."
          CID=$(docker run -d -p 25565:25565 -e EULA=TRUE $IMAGE)

          echo "Waiting for Minecraft to initialize..."

          FOUND=0

          for i in $(seq 1 12); do
            sleep 10
            if docker logs $CID 2>&1 | grep -q "Done"; then
              echo "Minecraft started successfully"
              FOUND=1
              break
            fi
          done

          echo "Stopping container..."
          docker stop $CID || true

          if [ $FOUND -ne 1 ]; then
            echo "Smoke test failed: Minecraft did not start"
            docker logs $CID || true
            exit 1
          fi