name: Build and Push Minecraft Image

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      
      - name: Build Docker image
        run: |
          docker build \
            -t minecraft-server:$IMAGE_TAG .

      
      - name: Tag image for ECR
        run: |
          docker tag minecraft-server:$IMAGE_TAG \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG

      
      - name: Push image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG

      
      - name: Smoke test Minecraft server
        run: |
          set -e

          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG"

          echo "Starting Minecraft container..."

          CID=$(docker run -d \
            -p 25565:25565 \
            -e EULA=TRUE \
            $IMAGE)

          FOUND=0

          echo "Waiting for Minecraft startup..."

          for i in $(seq 1 18); do
            sleep 10

            if docker logs $CID 2>&1 | grep -q "Done"; then
              echo "Minecraft started successfully"
              FOUND=1
              break
            fi
          done

          echo "Container logs:"
          docker logs $CID || true

          echo "Stopping container..."
          docker stop $CID || true

          if [ $FOUND -ne 1 ]; then
            echo "Smoke test failed"
            exit 1
          fi

      
      - name: Update Kubernetes image tag
        run: |
          sed -i "s|image: .*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG|g" \
          k8s/statefulset.yaml

     
      - name: Commit updated manifest
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add k8s/statefulset.yaml

          git diff --cached --quiet || git commit -m "Update Minecraft image to $IMAGE_TAG"

          git push